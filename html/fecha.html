<h1 class="text-4xl text-center text-cyan-500 mt-3">
	¿Cuándo se celebra el intercambio?
</h1>

<hr class="my-6 border-gray-300 w-1/3 mx-auto">

<div id="fechasSugeridas" class="flex flex-col gap-3 items-center"></div>

<button id="btnOtraFecha"
	class="px-4 py-2 rounded-lg transition bg-white text-black hover:bg-black hover:text-white
	dark:bg-blue-900 dark:text-white dark:hover:bg-blue-300 dark:hover:text-black">
	Otro
</button>

<div id="panelFecha" class="hidden mt-4 flex flex-col items-center gap-2">
	<label class="text-lg">Fecha de la celebracion: </label>
	<input type="date" id="inputFecha"
		class="px-3 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500
		dark:bg-gray-700 dark:text-white">
</div>

<div class="alerta text-center text-red-400 mb-3 text-sm"></div>

<button onclick="cargarPantalla('sorteo')"
        class="px-4 py-2 rounded-lg transition bg-white text-black hover:bg-black hover:text-white mb-4
                            dark:bg-black dark:text-white dark:hover:bg-white dark:hover:text-black"> Siguiente </button>
