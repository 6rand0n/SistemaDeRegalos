<h1 class="text-4xl text-center text-cyan-500 mt-3">
	¿Quieres establecer algunas exclusiones entre participantes?
</h1>

<hr class="my-6 border-gray-300 w-1/3 mx-auto">

<div class="flex justify-center gap-4 mt-6">

	<h2 class="text-center text-gray-400 mt-2 ">
		Restringe participantes para excluir a ciertas personas de ser asignadas a otras especificas.
	</h2>
</div>

<div class="flex gap-2 mt-4">
	<button id="btnNoExclusiones" class="px-4 py-2 rounded-lg transition bg-black text-white hover:bg-black hover:text-white
           			dark:bg-blue-300 dark:text-black dark:hover:bg-blue-300 dark:hover:text-black">
		No establecer exclusiones
	</button>
	<button id="btnExclusiones" class="px-4 py-2 rounded-lg transition bg-white text-black hover:bg-black hover:text-white
			dark:bg-blue-900 dark:text-white dark:hover:bg-blue-300 dark:hover:text-black">
		Establecer exclusiones
	</button>
</div>

<div id="panelExclusiones" class="hidden mt-8 bg-white dark:bg-gray-800 shadow-xl rounded-2xl p-6 space-y-4">
	<h2 class="text-lg text-gray-700 dark:text-white">
		Selecciona un participante:
	</h2>

	<div id="divExclusiones" class="space-y-4"></div>
</div>


<button onclick="cargarPantalla('evento')" class="px-4 py-2 rounded-lg transition bg-white text-black hover:bg-black hover:text-white
								dark:bg-black dark:text-white dark:hover:bg-white dark:hover:text-black"> Siguiente </button>
